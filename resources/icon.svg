<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#154733"/>
      <stop offset="100%" style="stop-color:#006747"/>
    </linearGradient>
    <linearGradient id="feather" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#FEE123"/>
      <stop offset="100%" style="stop-color:#d4bc1a"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="none" stroke="rgba(254,225,35,0.15)" stroke-width="2"/>

  <!-- Abstract P + feather shape -->
  <!-- The P stem -->
  <path d="M 168 120
           L 168 392
           Q 168 408 176 408
           L 192 408
           Q 200 408 200 392
           L 200 288"
        fill="none" stroke="url(#feather)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- The P bowl that curves into a feather -->
  <path d="M 200 152
           Q 200 120 232 120
           L 280 120
           Q 348 120 348 188
           Q 348 256 280 256
           L 200 256"
        fill="none" stroke="url(#feather)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Feather tip extending from the P bowl -->
  <path d="M 310 148
           Q 360 130 380 100
           Q 370 150 340 180"
        fill="url(#feather)" opacity="0.8"/>

  <!-- Feather quill detail (subtle line from bottom of P) -->
  <path d="M 184 392
           Q 200 420 240 416
           Q 280 412 300 380"
        fill="none" stroke="url(#feather)" stroke-width="8" stroke-linecap="round" opacity="0.5"/>

  <!-- Small feather barb lines on the bowl -->
  <path d="M 300 150 L 330 135" fill="none" stroke="rgba(254,225,35,0.4)" stroke-width="4" stroke-linecap="round"/>
  <path d="M 320 175 L 350 165" fill="none" stroke="rgba(254,225,35,0.3)" stroke-width="4" stroke-linecap="round"/>
  <path d="M 325 205 L 350 200" fill="none" stroke="rgba(254,225,35,0.25)" stroke-width="4" stroke-linecap="round"/>
</svg>
